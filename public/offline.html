<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline – Sales CRM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0F172A;
      color: #F1F5F9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #1E293B;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p  { color: #94A3B8; font-size: 15px; line-height: 1.6; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: #3B82F6;
      color: white;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #2563EB; }
    .note {
      margin-top: 20px;
      font-size: 13px;
      color: #64748B;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>No Internet Connection</h1>
    <p>
      You're offline right now. Your cached data is still available —
      any entries you make will sync automatically when you reconnect.
    </p>
    <button class="btn" onclick="location.reload()">Try Again</button>
    <p class="note">Data entered offline is saved locally and will sync when you're back online.</p>
  </div>
</body>
</html>
