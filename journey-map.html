<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey Map - Sales Manager CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --color-primary: #0D9488;
            --color-primary-dark: #0F766E;
            --color-blue: #1E3A8A;
            --color-text-dark: #1F2937;
            --color-text-muted: #6B7280;
            --color-border: #E5E7EB;
            --color-background: #F9FAFB;
            --color-white: #FFFFFF;
            --color-success: #10B981;
            --color-warning: #F59E0B;
            --color-error: #DC2626;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--color-background);
            color: var(--color-text-dark);
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            background: var(--color-white);
            padding: 0 2rem;
            height: 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--color-border);
            position: relative;
            z-index: 1001;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--color-text-dark);
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .nav-tabs {
            display: flex;
            gap: 0.25rem;
        }

        .nav-tab {
            padding: 0.5rem 1rem;
            text-decoration: none;
            color: var(--color-text-muted);
            font-weight: 500;
            font-size: 0.875rem;
            border-radius: var(--radius-md);
            transition: all 0.2s;
        }

        .nav-tab:hover {
            color: var(--color-primary);
            background: rgba(13, 148, 136, 0.05);
        }

        .nav-tab.active {
            color: var(--color-primary);
            background: rgba(13, 148, 136, 0.1);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-name {
            font-weight: 500;
            font-size: 0.875rem;
        }

        .btn-logout {
            padding: 0.5rem 1rem;
            background: var(--color-error);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.875rem;
        }

        /* ===== CONTROLS BAR ===== */
        .controls-bar {
            background: var(--color-white);
            padding: 0.75rem 2rem;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            z-index: 1000;
        }

        .stats-group {
            display: flex;
            gap: 1.5rem;
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--color-background);
            border-radius: 999px;
            font-size: 0.875rem;
        }

        .stat-pill .icon {
            font-size: 0.875rem;
        }

        .stat-pill .value {
            font-weight: 600;
            color: var(--color-primary);
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .filter-group label {
            font-size: 0.8rem;
            color: var(--color-text-muted);
        }

        .filter-group input[type="date"] {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 0.875rem;
        }

        .btn-filter {
            padding: 0.5rem 1rem;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .btn-filter.secondary {
            background: var(--color-text-muted);
        }

        .toggle-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
        }

        .toggle-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--color-primary);
        }

        /* ===== MAP ===== */
        #map {
            height: calc(100vh - 128px);
            width: 100%;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 999;
            background: var(--color-white);
            padding: 2rem 3rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--color-primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* ===== LEGEND ===== */
        .legend {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            background: var(--color-white);
            padding: 1rem 1.25rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            z-index: 1000;
        }

        .legend h4 {
            margin-bottom: 0.75rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-muted);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.375rem;
            font-size: 0.875rem;
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        .legend-color.field {
            background: var(--color-success);
        }

        .legend-color.office {
            background: #3B82F6;
        }

        .legend-color.route {
            background: var(--color-primary);
            width: 20px;
            height: 3px;
            border-radius: 2px;
        }

        /* ===== CUSTOM MARKERS ===== */
        .custom-div-icon {
            background: none;
            border: none;
        }

        .marker-container {
            position: relative;
            width: 50px;
            height: 50px;
        }

        .marker-pin {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--marker-color-light), var(--marker-color-dark));
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            position: absolute;
            left: 50%;
            top: 50%;
            margin-left: -18px;
            margin-top: -18px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            animation: markerBounce 0.5s ease forwards;
        }

        .marker-number {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -70%);
            color: white;
            font-weight: 700;
            font-size: 14px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        @keyframes markerBounce {
            0% {
                opacity: 0;
                transform: rotate(-45deg) scale(0);
            }

            50% {
                transform: rotate(-45deg) scale(1.2);
            }

            100% {
                opacity: 1;
                transform: rotate(-45deg) scale(1);
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 0 1rem;
            }

            .header h1 {
                font-size: 1rem;
            }

            .nav-tabs {
                display: none;
            }

            .controls-bar {
                flex-direction: column;
                padding: 0.5rem 1rem;
            }

            .stats-group {
                flex-wrap: wrap;
            }

            .filter-group {
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="logo">
                <div class="logo-icon">
                    <img src="DCC Logo Back.png" alt="DCC">
                </div>
                <span>Journey Map</span>
            </div>
            <nav class="nav-tabs">
                <a href="dashboard-manager.html" class="nav-tab">📊 Daily Log</a>
                <a href="journey-map.html" class="nav-tab active">🗺️ Journey Map</a>
                <a href="daily-sales-report.html" class="nav-tab">📈 Reports</a>
                <a href="product-day.html" class="nav-tab">📦 Product Day</a>
            </nav>
        </div>
        <div class="header-right">
            <span class="user-name" id="userName">Loading...</span>
            <button class="btn-logout" onclick="logout()">🚪 Logout</button>
        </div>
    </div>

    <!-- Controls Bar -->
    <div class="controls-bar">
        <div class="stats-group">
            <div class="stat-pill">
                <span class="icon">📍</span>
                <span>Total Visits:</span>
                <span class="value" id="totalVisits">0</span>
            </div>
            <div class="stat-pill">
                <span class="icon">🚗</span>
                <span>Field:</span>
                <span class="value" id="fieldVisits">0</span>
            </div>
            <div class="stat-pill">
                <span class="icon">🏢</span>
                <span>Office:</span>
                <span class="value" id="officeVisits">0</span>
            </div>
            <div class="stat-pill">
                <span class="icon">📏</span>
                <span>Distance:</span>
                <span class="value" id="distanceCovered">0 km</span>
            </div>
        </div>

        <div class="filter-group">
            <label>From:</label>
            <input type="date" id="dateFrom">
            <label>To:</label>
            <input type="date" id="dateTo">
            <button class="btn-filter" onclick="applyDateFilter()">🔍 Filter</button>
            <button class="btn-filter secondary" onclick="resetFilter()">↺ Reset</button>
            <label class="toggle-checkbox">
                <input type="checkbox" id="toggleRoutes" checked onchange="toggleRoutes()">
                <span>Show Routes</span>
            </label>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="loading">
        <div class="loading-spinner"></div>
        <p>Loading journey map...</p>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Legend -->
    <div class="legend">
        <h4>Legend</h4>
        <div class="legend-item">
            <div class="legend-color field"></div>
            <span>Field Visit</span>
        </div>
        <div class="legend-item">
            <div class="legend-color office"></div>
            <span>Office Visit</span>
        </div>
        <div class="legend-item">
            <div class="legend-color route"></div>
            <span>Travel Route</span>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const API_URL = 'http://localhost:3001';
        let currentUser = null;
        let map = null;
        let markers = [];
        let routePolyline = null;
        let allVisits = [];

        // Check authentication
        window.addEventListener('load', () => {
            const authData = localStorage.getItem('auth-storage') || sessionStorage.getItem('auth-storage');

            if (!authData) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const { state } = JSON.parse(authData);

                if (!state.isAuthenticated) {
                    window.location.href = 'login.html';
                    return;
                }

                currentUser = state.user;
                document.getElementById('userName').textContent = currentUser.username;

                if (currentUser.role === 'Admin') {
                    window.location.href = 'dashboard-admin.html';
                }

                // Set default dates
                const today = new Date().toISOString().split('T')[0];
                const weekAgo = new Date();
                weekAgo.setDate(weekAgo.getDate() - 7);
                document.getElementById('dateFrom').value = weekAgo.toISOString().split('T')[0];
                document.getElementById('dateTo').value = today;

                // Initialize map
                initMap();
                loadVisits();

            } catch (e) {
                console.error('Error:', e);
                window.location.href = 'login.html';
            }
        });

        function initMap() {
            map = L.map('map').setView([19.0760, 72.8777], 12);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);

            document.getElementById('loading').style.display = 'none';
        }

        async function loadVisits() {
            try {
                const response = await fetch(`${API_URL}/api/visits/${currentUser.id}`);
                const data = await response.json();

                if (data.success) {
                    allVisits = data.visits;
                    displayVisitsOnMap(allVisits);
                    updateStats(allVisits);
                }
            } catch (error) {
                console.error('Error loading visits:', error);
                document.getElementById('loading').innerHTML = '<p style="color: #DC2626;">Error loading visits</p>';
            }
        }

        function displayVisitsOnMap(visits) {
            markers.forEach(marker => map.removeLayer(marker));
            markers = [];

            if (routePolyline) {
                map.removeLayer(routePolyline);
            }

            const validVisits = visits.filter(v => v.latitude && v.longitude);

            if (validVisits.length === 0) {
                return;
            }

            const sortedVisits = [...validVisits].sort((a, b) =>
                new Date(a.created_at) - new Date(b.created_at)
            );

            sortedVisits.forEach((visit, index) => {
                const visitNumber = index + 1;
                const isField = visit.visit_type === 'Field Visit';

                const colorLight = isField ? '#10B981' : '#3B82F6';
                const colorDark = isField ? '#059669' : '#2563EB';

                const icon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `
                        <div class="marker-container" style="
                            --marker-color-light: ${colorLight};
                            --marker-color-dark: ${colorDark};
                        ">
                            <div class="marker-pin"></div>
                            <div class="marker-number">${visitNumber}</div>
                        </div>
                    `,
                    iconSize: [50, 50],
                    iconAnchor: [25, 50],
                    popupAnchor: [0, -50]
                });

                const marker = L.marker([visit.latitude, visit.longitude], { icon })
                    .bindPopup(`
                        <div style="font-family: Inter, sans-serif; min-width: 200px;">
                            <h3 style="margin: 0 0 0.5rem 0; color: #1E3A8A; font-size: 1rem; display: flex; align-items: center; gap: 0.5rem;">
                                <span style="
                                    display: inline-flex;
                                    width: 26px;
                                    height: 26px;
                                    background: linear-gradient(135deg, ${colorLight}, ${colorDark});
                                    border-radius: 50%;
                                    color: white;
                                    align-items: center;
                                    justify-content: center;
                                    font-weight: bold;
                                    font-size: 0.8rem;
                                ">${visitNumber}</span>
                                ${visit.client_name}
                            </h3>
                            <p style="margin: 0; font-size: 0.8rem; line-height: 1.6;">
                                <strong>Type:</strong> ${visit.client_type}<br>
                                <strong>Visit:</strong> ${visit.visit_type}<br>
                                <strong>Location:</strong> ${visit.location}<br>
                                <strong>Time:</strong> ${new Date(visit.created_at).toLocaleTimeString()}<br>
                                ${visit.notes ? `<strong>Notes:</strong> ${visit.notes}` : ''}
                            </p>
                        </div>
                    `)
                    .addTo(map);

                markers.push(marker);
            });

            if (document.getElementById('toggleRoutes').checked) {
                drawRoutes(sortedVisits);
            }

            if (sortedVisits.length > 0) {
                const group = L.featureGroup(markers);
                map.fitBounds(group.getBounds().pad(0.1));
            }
        }

        function drawRoutes(visits) {
            const sortedVisits = [...visits].sort((a, b) =>
                new Date(a.created_at) - new Date(b.created_at)
            );

            const coordinates = sortedVisits.map(v => [v.latitude, v.longitude]);

            routePolyline = L.polyline(coordinates, {
                color: '#0D9488',
                weight: 3,
                opacity: 0.7,
                dashArray: '10, 10'
            }).addTo(map);
        }

        function toggleRoutes() {
            if (routePolyline) {
                map.removeLayer(routePolyline);
                routePolyline = null;
            }

            if (document.getElementById('toggleRoutes').checked) {
                const validVisits = allVisits.filter(v => v.latitude && v.longitude);
                drawRoutes(validVisits);
            }
        }

        function updateStats(visits) {
            const fieldVisits = visits.filter(v => v.visit_type === 'Field Visit').length;
            const officeVisits = visits.filter(v => v.visit_type === 'Office Visit').length;

            document.getElementById('totalVisits').textContent = visits.length;
            document.getElementById('fieldVisits').textContent = fieldVisits;
            document.getElementById('officeVisits').textContent = officeVisits;

            const validVisits = visits.filter(v => v.latitude && v.longitude)
                .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

            let totalDistance = 0;
            for (let i = 1; i < validVisits.length; i++) {
                totalDistance += calculateDistance(
                    validVisits[i - 1].latitude, validVisits[i - 1].longitude,
                    validVisits[i].latitude, validVisits[i].longitude
                );
            }

            document.getElementById('distanceCovered').textContent = totalDistance.toFixed(1) + ' km';
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = toRad(lat2 - lat1);
            const dLon = toRad(lon2 - lon1);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function toRad(degrees) {
            return degrees * Math.PI / 180;
        }

        function applyDateFilter() {
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;

            if (!dateFrom || !dateTo) {
                alert('Please select both start and end dates');
                return;
            }

            const filtered = allVisits.filter(visit => {
                const visitDate = visit.visit_date || visit.created_at.split('T')[0];
                return visitDate >= dateFrom && visitDate <= dateTo;
            });

            displayVisitsOnMap(filtered);
            updateStats(filtered);
        }

        function resetFilter() {
            document.getElementById('dateFrom').value = '';
            document.getElementById('dateTo').value = '';
            displayVisitsOnMap(allVisits);
            updateStats(allVisits);
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('auth-storage');
                sessionStorage.removeItem('auth-storage');
                localStorage.clear();
                sessionStorage.clear();
                window.location.href = 'login.html';
            }
        }
    </script>
</body>

</html>
